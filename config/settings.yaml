# Default configuration for modular-log-analysis-toolkit
log_paths:
  - /var/log/syslog
  - /var/log/auth.log
  - /var/log/application.log

output:
  format: json
  directory: ./output

parsing:
  timestamp_format: "%Y-%m-%d %H:%M:%S"
  multiline: true
  max_line_length: 4096

retention:
  days: 30
  compress_old: true

alerts:
  enabled: true
  threshold_error: 10
  threshold_warn: 50

cache:
  max_size: 1000
  ttl: 300
  query_cache_size: 500

streaming:
  batch_size: 100
  buffer_size: 8192
